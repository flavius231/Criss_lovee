<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criss lovee</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* --- ACTUALIZARE FUNDAL --- */
            background-color: #a4005a; /* Culoare de fallback */
            background-image: url('1.jpeg'); /* Poza de fundal */
            background-size: cover; /* Scala imaginea pentru a acoperi tot body-ul */
            background-position: center; /* Centrează imaginea */
            background-repeat: no-repeat; /* Nu repetă imaginea */
            
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            gap: 40px; 
        }

        /* --- ANIMAȚII DE INTRARE --- */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes growUp {
            0% { transform: translateX(-50%) scaleY(0); transform-origin: bottom; opacity: 0; }
            100% { transform: translateX(-50%) scaleY(1); transform-origin: bottom; opacity: 1; }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateX(-50%) scale(0.8); }
            80% { opacity: 1; transform: translateX(-50%) scale(1.05); }
            100% { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.05); }
            70% { transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* --- STILURI DE BAZĂ (PENTRU PC) --- */
        .card {
            background-color: #f5eee6;
            width: 900px;
            max-width: 95vw; 
            height: 600px;
            border-radius: 35px;
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            box-sizing: border-box;
            animation: slideUpFade 1s ease-out both; 
        }

        .top-text-container {
            position: absolute;
            top: 70px;
            left: 70px;
            width: 450px; 
            font-size: 24px;
            color: #4a3b32;
            line-height: 1.4;
            font-style: italic;
        }

        .top-text-container::after {
            content: '|';
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }

        .tree-container {
            position: absolute;
            right: 120px;
            bottom: 60px;
            width: 350px;
            height: 450px;
        }

        .tree-trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 160px;
            background-color: #7a4b27;
            clip-path: polygon(20% 0, 80% 0, 100% 100%, 0% 100%);
            animation: growUp 0.7s ease-out 0.8s both; 
        }

        .crown {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 320px;
            height: 320px;
            animation: popIn 0.8s ease-out 1.2s both; 
        }

        .heart {
            position: absolute;
            user-select: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .flying-heart {
            position: absolute;
            user-select: none;
            opacity: 1;
            animation: fly-away 3s linear forwards;
        }

        @keyframes fly-away {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(-250px, 80px) scale(0.6) rotate(-45deg); opacity: 0; }
        }

        .bottom-content {
            position: absolute;
            bottom: 65px;
            left: 70px;
            animation: fadeIn 1s ease-out 1.8s both; 
        }

        .intro-text { font-size: 22px; color: #4a3b32; margin: 0 0 5px 0; }
        
        .timer { font-size: 20px; color: #4a3b32; display: flex; align-items: baseline; gap: 6px; }
        .timer span { font-size: 32px; font-weight: 400; }

        .bottom-line {
            position: absolute;
            bottom: 45px;
            left: 30px;
            right: 30px;
            height: 4px;
            background-color: #3b2c24;
            border-radius: 2px;
            animation: fadeIn 1s ease-out 1.8s both;
        }

        .button-container {
            text-align: center;
            z-index: 10;
            animation: bounceIn 0.8s ease-out 2.5s both; 
        }

        .celebrate-btn {
            background-color: #f5eee6; 
            color: #a4005a; 
            border: 2px solid #f5eee6;
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .celebrate-btn:hover { background-color: transparent; color: #f5eee6; }
        .celebrate-btn:active { transform: scale(0.95); }

        #explosion-container {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; 
            z-index: 9999; 
        }

        .explosion-heart {
            position: absolute;
            user-select: none;
            opacity: 1;
            animation: scatter-hearts ease-out forwards;
        }

        @keyframes scatter-hearts {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0.4) rotate(var(--r)); opacity: 0; }
        }

        /* =========================================
           ADAPTABILITATE PENTRU TELEFOANE (RESPONSIVE)
           ========================================= */
        @media (max-width: 850px) {
            body {
                overflow-y: auto; 
                padding: 20px 0;
            }

            .card {
                width: 90%;
                height: auto;
                min-height: 80vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                padding: 30px 20px;
            }

            .top-text-container {
                position: relative;
                top: auto;
                left: auto;
                width: 100%;
                text-align: center;
                font-size: 20px;
                min-height: 90px; 
            }

            .tree-container {
                position: relative;
                right: auto;
                bottom: auto;
                width: 280px;
                height: 350px;
                transform: scale(0.9); 
                margin: 20px 0;
            }

            .bottom-content {
                position: relative;
                bottom: auto;
                left: auto;
                width: 100%;
                text-align: center;
            }

            .timer {
                justify-content: center;
                flex-wrap: wrap; 
                font-size: 16px;
            }

            .timer span {
                font-size: 26px;
            }

            .bottom-line {
                position: relative;
                bottom: auto;
                left: auto;
                right: auto;
                width: 80%;
                margin: 20px auto 0 auto;
            }

            .celebrate-btn {
                font-size: 18px;
                padding: 12px 28px;
            }
        }
    </style>
</head>
<body>

    <div id="explosion-container"></div>

    <div class="card">
        <div class="top-text-container" id="typewriter-text"></div>

        <div class="tree-container">
            <div class="tree-trunk"></div>
            <div class="crown" id="crown"></div>
        </div>

        <div class="bottom-content">
            <p class="intro-text">Te iubesc de ...</p>
            <div class="timer" id="timer">
                <span id="days">0</span> zile
                <span id="hours">00</span> ore
                <span id="minutes">00</span> minute
                <span id="seconds">00</span> secunde
            </div>
        </div>

        <div class="bottom-line"></div>
    </div>

    <div class="button-container">
        <button class="celebrate-btn" id="celebrateBtn">❤️ Sărbătorește ❤️</button>
    </div>

    <script>
        /* =========================================
           1. ANIMAȚIE TYPEWRITER
           ========================================= */
        const textToType = "Esti cea mai importanta persoana din viata mea si vreau sa iti spun ca te iubesc enorm de mult.";
        const textElement = document.getElementById("typewriter-text");
        let charIndex = 0;

        function typeWriter() {
            if (charIndex < textToType.length) {
                textElement.innerHTML += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 60); 
            }
        }
        setTimeout(typeWriter, 2500);

        /* =========================================
           2. CRONOMETRU EXACT (VALOAREA EXACTĂ)
           ========================================= */
        const startDate = new Date("2022-06-15T00:00:00"); 

        function updateTimer() {
            const now = new Date();
            const difference = now - startDate;

            if (difference < 0) return;

            // Fără rotunjire - doar valoarea întreagă scursă
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((difference / 1000 / 60) % 60);
            const seconds = Math.floor((difference / 1000) % 60);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        updateTimer();
        setInterval(updateTimer, 1000);

        /* =========================================
           3. COPAC CIRCULAR
           ========================================= */
        const crown = document.getElementById('crown');
        const heartEmojis = ['❤️', '💖', '💗', '💓', '💕', '🔴'];
        const totalHearts = 350; 
        const maxRadius = 48; 

        for (let i = 0; i < totalHearts; i++) {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.sqrt(Math.random()) * maxRadius; 
            
            const x = 50 + radius * Math.cos(angle);
            const y = 50 + radius * Math.sin(angle);
            const size = 15 + Math.random() * 30; 
            
            heart.style.left = `calc(${x}% - ${size/2}px)`;
            heart.style.top = `calc(${y}% - ${size/2}px)`;
            heart.style.fontSize = `${size}px`;
            heart.style.zIndex = Math.floor(Math.random() * 10);
            
            crown.appendChild(heart);
        }

        /* =========================================
           4. INIMI ZBURĂTOARE DIN COPAC
           ========================================= */
        setTimeout(() => {
            setInterval(() => {
                const flyingHeart = document.createElement('div');
                flyingHeart.className = 'flying-heart';
                flyingHeart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
                
                const startY = 20 + Math.random() * 60; 
                const size = 15 + Math.random() * 20;
                
                flyingHeart.style.left = `20%`;
                flyingHeart.style.top = `${startY}%`;
                flyingHeart.style.fontSize = `${size}px`;
                
                crown.appendChild(flyingHeart);

                setTimeout(() => {
                    flyingHeart.remove();
                }, 3000);
                
            }, 500);
        }, 1500);

        /* =========================================
           5. EXPLOZIE DE INIMI PE TOT ECRANUL
           ========================================= */
        const celebrateBtn = document.getElementById('celebrateBtn');
        const explosionContainer = document.getElementById('explosion-container');
        const explosiveHeartEmojis = ['❤️', '💖', '💗', '💓', '💕', '🔴', '⭐', '✨'];

        celebrateBtn.addEventListener('click', () => {
            const btnRect = celebrateBtn.getBoundingClientRect();
            const startX = btnRect.left + btnRect.width / 2;
            const startY = btnRect.top + btnRect.height / 2;

            for (let i = 0; i < 100; i++) {
                const heart = document.createElement('div');
                heart.className = 'explosion-heart';
                heart.innerText = explosiveHeartEmojis[Math.floor(Math.random() * explosiveHeartEmojis.length)];

                heart.style.left = `${startX}px`;
                heart.style.top = `${startY}px`;

                const size = 15 + Math.random() * 35; 
                heart.style.fontSize = `${size}px`;

                const angle = Math.random() * Math.PI * 2;
                const distance = 150 + Math.random() * 800; 
                const x = Math.cos(angle) * distance;
                const y = Math.sin(angle) * distance;
                const rotation = (Math.random() - 0.5) * 1080; 

                heart.style.setProperty('--x', `${x}px`);
                heart.style.setProperty('--y', `${y}px`);
                heart.style.setProperty('--r', `${rotation}deg`);

                const duration = 2.5 + Math.random() * 2.5; 
                heart.style.animationDuration = `${duration}s`;

                explosionContainer.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, duration * 1000);
            }
        });

    </script>
</body>
</html>
